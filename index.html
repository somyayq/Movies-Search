<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Searcher</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <nav class="navbar">
    <div class="logo">CINESEARCH</div>
    </nav>    
    <h1 class="title">Find your <span id="cycling-text">next</span> obsession.</h1>
    <div class="container">
        <div class="search-controls">
            <div class="search-container">
                <input type="text" id="movie-name" placeholder="Search movies, directors, or actors">
            </div>
            <button id="search-btn">Search</button>
        </div>
        <div id="result"></div>
    </div>
    
    <div class="status-container">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Live</span>
    </div>
    <script src="./dist/key.js"></script>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
